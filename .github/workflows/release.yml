name: Release (signed AAB + APK)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & publish signed release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-overwrite-existing: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/inkframe-release.jks"
            echo "path=$RUNNER_TEMP/inkframe-release.jks" >> "$GITHUB_OUTPUT"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No KEYSTORE_BASE64 secret — building debug-signed."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed App Bundle + APK
        env:
          INKFRAME_KEYSTORE: ${{ steps.keystore.outputs.path }}
          INKFRAME_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          INKFRAME_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          INKFRAME_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease --stacktrace --info

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp app/build/outputs/bundle/release/*.aab "release/InkFrame-${GITHUB_REF_NAME}.aab" 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk "release/InkFrame-${GITHUB_REF_NAME}.apk" 2>/dev/null || true

      - name: Upload artifacts to the run
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-release-${{ github.ref_name }}
          path: release/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          name: InkFrame ${{ github.ref_name }}
          body: |
            InkFrame Studio ${{ github.ref_name }} - Glass Horizon Master Build
            
            - Andrew Kramer Saber Glow
            - Kim Jung Gi Perspective Engine
            - Proko Structural Nodes
            - CSP Vector Correction & Merging
