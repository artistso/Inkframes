name: Android CI – Build & Release APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write  # required for creating/updating GitHub Releases

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 (matches compileOptions in build.gradle.kts) ──────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 3. Gradle wrapper must be executable ──────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      # ── 5. Always upload APK as a workflow artifact (30-day retention) ────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkframe-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 6. On main-branch push → create/overwrite the "latest" release ───
      - name: Release latest debug build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "InkFrame – Latest Debug Build"
          body: |
            🤖 **Auto-built** from commit `${{ github.sha }}` on `main`.

            Download `app-debug.apk` below and sideload onto your device.

            > ⚠️ This is a debug build — not signed for production.
            
            ### Features included:
            - Andrew Kramer Saber Glow (Flicker active)
            - Kim Jung Gi Perspective Engine
            - Proko Structural Nodes
            - Fibonacci Organic UI
          files: app/build/outputs/apk/debug/*.apk
          make_latest: true
          prerelease: true
